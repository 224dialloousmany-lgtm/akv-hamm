<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLDTV — Toutes les chaînes du monde</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080a0f;
    --surface: #0f1219;
    --border: #1e2433;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --text: #e0e6f0;
    --muted: #4a5568;
    --scan: rgba(0,229,255,0.03);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scan) 2px,
      var(--scan) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9998;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(8,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
    position: relative;
  }
  .logo span { color: var(--accent2); }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 1.4s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent2);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .channel-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .channel-count b { color: var(--accent); }

  /* SEARCH + FILTERS */
  .controls {
    padding: 1.5rem 2rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search-wrap svg {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 16px; height: 16px;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.65rem 1rem 0.65rem 2.6rem;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .filter-group {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,229,255,0.15);
  }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 140px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 140px);
    position: sticky;
    top: 60px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .region-header {
    padding: 1rem 1.5rem 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .country-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.7rem 1.5rem;
    cursor: pointer;
    border-bottom: 1px solid rgba(30,36,51,0.5);
    transition: background 0.15s;
  }
  .country-item:hover { background: rgba(0,229,255,0.04); }
  .country-item.active {
    background: rgba(0,229,255,0.08);
    border-left: 2px solid var(--accent);
  }
  .country-flag { font-size: 1.3rem; line-height: 1; }
  .country-name {
    font-size: 0.85rem;
    color: var(--text);
    flex: 1;
  }
  .country-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    background: var(--border);
    padding: 2px 6px;
    border-radius: 2px;
  }

  /* CHANNEL GRID */
  .channel-area {
    padding: 1.5rem 2rem;
    overflow-y: auto;
  }

  .area-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--text);
    margin-bottom: 0.3rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .area-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }

  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .channel-card {
    background: var(--surface);
    padding: 1.2rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    position: relative;
    overflow: hidden;
  }
  .channel-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(0,229,255,0.04));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .channel-card:hover { background: #131824; }
  .channel-card:hover::after { opacity: 1; }
  .channel-card.active {
    background: rgba(0,229,255,0.06);
    outline: 1px solid var(--accent);
  }

  .ch-logo {
    width: 48px; height: 48px;
    border-radius: 4px;
    object-fit: contain;
    background: #1a1f2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    overflow: hidden;
  }
  .ch-logo img { width: 100%; height: 100%; object-fit: contain; }

  .ch-name {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.2;
  }
  .ch-category {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .ch-lang {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    padding: 2px 6px;
    background: var(--border);
    border-radius: 2px;
    color: var(--muted);
    align-self: flex-start;
  }

  /* PLAYER MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 100%;
    max-width: 900px;
    overflow: hidden;
    transform: translateY(20px);
    transition: transform 0.25s;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,255,0.1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .modal-title {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .modal-ch-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { border-color: var(--accent2); color: var(--accent2); }

  .player-area {
    background: #000;
    aspect-ratio: 16/9;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    overflow: hidden;
  }

  /* TV static animation */
  .tv-static {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
    animation: staticAnim 0.08s infinite;
    opacity: 0.3;
  }
  @keyframes staticAnim {
    0% { transform: translate(0, 0) scale(1.02); }
    25% { transform: translate(-2px, 1px) scale(1); }
    50% { transform: translate(2px, -1px) scale(1.01); }
    75% { transform: translate(-1px, 2px) scale(1); }
    100% { transform: translate(1px, -2px) scale(1.02); }
  }

  .player-icon { font-size: 3rem; z-index: 1; }
  .player-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);
    text-align: center;
    z-index: 1;
    max-width: 400px;
    line-height: 1.6;
  }

  .stream-link {
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    align-items: center;
  }
  .stream-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 0.6rem 1.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
    text-decoration: none;
    display: inline-block;
  }
  .stream-btn:hover { opacity: 0.85; }

  .modal-info {
    padding: 1rem 1.5rem;
    display: flex;
    gap: 2rem;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .info-value { font-size: 0.82rem; color: var(--text); }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem;
    gap: 1rem;
    color: var(--muted);
    text-align: center;
  }
  .empty svg { opacity: 0.3; }
  .empty p { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; }

  /* Ticker */
  .ticker {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    white-space: nowrap;
    padding: 0.4rem 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .ticker-inner {
    display: inline-block;
    animation: ticker 40s linear infinite;
  }
  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { max-height: 200px; position: relative; top: 0; display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; border-right: none; border-bottom: 1px solid var(--border); }
    .region-header { display: none; }
    .country-item { min-width: 100px; border-bottom: none; border-right: 1px solid rgba(30,36,51,0.5); }
    .controls { padding: 1rem; }
    .channel-area { padding: 1rem; }
  }
</style>
</head>

  </div>
</div>

// =====================
// STATE
// =====================
let activeCountry = null;
let activeCat = "all";
let searchQ = "";
let selectedChannel = null;

// =====================
// RENDER SIDEBAR
// =====================
function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  // "All" option
  const allItem = document.createElement("div");
  allItem.className = "country-item" + (activeCountry === null ? " active" : "");
  allItem.innerHTML = `<span class="country-flag">🌍</span><span class="country-name">Monde entier</span><span class="country-count">${CHANNELS.length}</span>`;
  allItem.onclick = () => { activeCountry = null; renderAll(); };
  sidebar.appendChild(allItem);

  REGIONS.forEach(region => {
    const hdr = document.createElement("div");
    hdr.className = "region-header";
    hdr.textContent = region.name;
    sidebar.appendChild(hdr);

    region.countries.forEach(c => {
      const count = CHANNELS.filter(ch => ch.country === c.code).length;
      if (!count) return;
      const item = document.createElement("div");
      item.className = "country-item" + (activeCountry === c.code ? " active" : "");
      item.innerHTML = `<span class="country-flag">${c.flag}</span><span class="country-name">${c.name}</span><span class="country-count">${count}</span>`;
      item.onclick = () => { activeCountry = c.code; renderAll(); };
      sidebar.appendChild(item);
    });
  });
}

// =====================
// FILTER CHANNELS
// =====================
function getFiltered() {
  return CHANNELS.filter(ch => {
    const matchCountry = !activeCountry || ch.country === activeCountry;
    const matchCat = activeCat === "all" || ch.cat === activeCat;
    const matchSearch = !searchQ || ch.name.toLowerCase().includes(searchQ) || ch.countryName.toLowerCase().includes(searchQ);
    return matchCountry && matchCat && matchSearch;
  });
}

// =====================
// RENDER CHANNELS
// =====================
function renderChannels() {
  const grid = document.getElementById("channels-grid");
  const filtered = getFiltered();
  document.getElementById("count").textContent = filtered.length;
  grid.innerHTML = "";

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Aucune chaîne trouvée</p></div>`;
    return;
  }

  filtered.forEach(ch => {
    const card = document.createElement("div");
    card.className = "channel-card";
    card.innerHTML = `
      <div class="ch-logo">
        <img src="${ch.logo}" alt="${ch.name}" onerror="this.parentElement.textContent='${ch.flag}'" />
      </div>
      <div class="ch-name">${ch.name}</div>
      <div class="ch-category">${ch.cat}</div>
      <div class="ch-lang">${ch.lang}</div>
    `;
    card.onclick = () => openModal(ch);
    grid.appendChild(card);
  });
}

// =====================
// TITLE
// =====================
function renderTitle() {
  let title = "🌍 Monde entier";
  let sub = "Toutes les chaînes disponibles";

  if (activeCountry) {
    const allCountries = REGIONS.flatMap(r => r.countries);
    const c = allCountries.find(c => c.code === activeCountry);
    if (c) {
      title = `${c.flag} ${c.name}`;
      sub = `Chaînes disponibles pour ${c.name}`;
    }
  }
  document.getElementById("area-title").innerHTML = title;
  document.getElementById("area-sub").textContent = sub;
}

function renderAll() {
  renderSidebar();
  renderTitle();
  renderChannels();
}

// =====================
// MODAL
// =====================
function openModal(ch) {
  selectedChannel = ch;
  document.getElementById("modal-name").textContent = ch.name;
  document.getElementById("modal-flag").textContent = ch.flag;
  const logo = document.getElementById("modal-logo");
  logo.innerHTML = `<img src="${ch.logo}" alt="${ch.name}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentElement.textContent='${ch.flag}'" />`;
  document.getElementById("info-country").textContent = `${ch.flag} ${ch.countryName}`;
  document.getElementById("info-cat").textContent = ch.cat;
  document.getElementById("info-lang").textContent = ch.lang;
  document.getElementById("stream-url").href = ch.stream;
  document.getElementById("stream-url").textContent = "▶ OUVRIR LE FLUX EN DIRECT";
  document.getElementById("modal-overlay").classList.add("open");
}

document.getElementById("modal-close").onclick = () => {
  document.getElementById("modal-overlay").classList.remove("open");
};
document.getElementById("modal-overlay").onclick = (e) => {
  if (e.target === document.getElementById("modal-overlay")) {
    document.getElementById("modal-overlay").classList.remove("open");
  }
};

// =====================
// FILTERS
// =====================
document.getElementById("categories").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeCat = btn.dataset.cat;
  renderChannels();
});

document.getElementById("search").addEventListener("input", e => {
  searchQ = e.target.value.trim().toLowerCase();
  renderChannels();
});

// =====================
// TICKER
// =====================
function buildTicker() {
  const items = CHANNELS.map(ch => `${ch.flag} ${ch.name}`).join("  ·  ");
  const full = items + "  ·  " + items;
  const el = document.getElementById("ticker-text");
  el.textContent = full;
}

// =====================
// INIT
// =====================
buildTicker();
renderAll();
</script>
